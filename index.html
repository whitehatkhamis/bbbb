<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KhamChat Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
:root{--bg1:#f5f3ff;--bg2:#ede9fe;--accent:#25D366;--accent2:#128C7E;--gold:#fbbf24;--green:#10b981;--blue:#3b82f6;
--text:#1f2937;--text2:#6b7280;--card:#fff;--border:rgba(37,211,102,0.2);}
body.dark{--bg1:#0a0a1f;--bg2:#1a0f2e;--text:#f3f4f6;--text2:#a1a1aa;--card:rgba(26,15,46,0.7);}
html,body{height:100dvh;width:100vw;overflow:hidden;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--text)}
#app{height:100dvh;width:100vw;display:flex;flex-direction:column}
.glass{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border)}
.header{background:var(--card);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.header h1{font-size:24px;font-weight:700;color:var(--accent)}
.headerRight{display:flex;gap:12px;align-items:center}
.iconCircle{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(37,211,102,0.3)}
.iconCircle svg{width:22px;height:22px;fill:#fff}
.tabs{display:flex;justify-content:space-around;background:var(--card);padding:8px;margin:12px;border-radius:16px}
.tab{cursor:pointer;padding:10px 18px;border-radius:12px;font-weight:600;color:var(--text2);font-size:14px;transition:0.3s;display:flex;align-items:center;gap:6px}
.tab.active{background:var(--accent);color:#fff}
.tab svg{width:18px;height:18px;fill:currentColor}
#chatArea{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.userItem,.groupItem,.callItem{background:var(--card);padding:16px;border-radius:16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.userItem b{font-size:16px}
.userItem span{font-size:13px;color:var(--text2)}
.storyRing{border:3px solid var(--green);padding:2px;border-radius:50%}
.message{position:relative;background:var(--card);padding:12px 16px;border-radius:18px;max-width:75%;font-size:15px;border-bottom-left-radius:6px;align-self:flex-start;word-break:break-word}
.message.me{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-left-radius:18px;border-bottom-right-radius:6px;align-self:flex-end}
.message.bot{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}
.message b{display:block;font-size:13px;margin-bottom:4px;opacity:0.8}
.message img,.message video{max-width:200px;border-radius:12px;margin-top:8px;display:block}
.small{font-size:11px;opacity:0.7;margin-top:4px;display:flex;gap:8px;align-items:center}
.ticks.seen{color:var(--blue)}
.msgBtn{background:transparent;border:none;color:var(--text2);font-size:11px;cursor:pointer;padding:2px 4px}
.reactionBar{position:absolute;top:-30px;left:0;background:var(--card);padding:4px 8px;border-radius:20px;display:none;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.message:hover.reactionBar{display:flex}
.reaction{cursor:pointer;font-size:16px}
.reactionCount{font-size:11px;margin-left:4px}
.bottom{display:none;gap:8px;padding:12px 16px;background:var(--card);border-top:1px solid var(--border)}
.bottom.show{display:flex}
.bottom input{flex:1;padding:14px 18px;background:var(--bg2);border:none;border-radius:24px;color:var(--text);outline:none;font-size:15px}
.bottom button{width:48px;height:48px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.iconBtn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg2)}
.iconBtn svg{width:24px;height:24px;fill:var(--text2)}
.iconBtn.recording{background:red;animation:pulse 1s infinite}
.iconBtn.recording svg{fill:#fff}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:2000}
.modal.show{display:flex}
.modalBox{background:var(--card);width:90%;max-width:360px;border-radius:20px;padding:24px;border:1px solid var(--border);text-align:center}
.modalBox input{width:100%;padding:14px;margin-top:12px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:16px}
.btn{width:100%;padding:14px;margin-top:12px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
#typing{padding:0 16px;font-size:12px;color:var(--text2);height:20px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:12px 20px;border-radius:24px;z-index:3000;display:none}
.chatHeader{background:var(--card);padding:12px 16px;border-bottom:1px solid var(--border);display:none;gap:12px;align-items:center}
.chatHeader.show{display:flex}
.backBtn{font-size:22px;cursor:pointer}
.statusBar{display:flex;gap:12px;padding:12px 16px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border)}
.statusItem{text-align:center;cursor:pointer;flex-shrink:0}
.statusItem img{width:60px;height:60px;border-radius:50%;object-fit:cover}
#botBtn{position:fixed;bottom:80px;right:20px;z-index:1000;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);cursor:pointer;border:none}
#botBtn svg{width:28px;height:28px;fill:#fff}
</style>
</head>
<body>

<div id="app">
<div class="header glass">
<h1>KhamChat</h1>
<div class="headerRight">
<!-- Earned Money Icon -->
<div class="iconCircle" id="moneyBtn" title="Earned Money">
<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
</div>
<!-- Earned Graph Icon -->
<div class="iconCircle" id="setBtn" title="Earned">
<svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
</div>
</div>
</div>

<div class="tabs glass">
<!-- Chats Tab = WhatsApp Phone Icon -->
<div class="tab active" id="tabChats">
<svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.57c.27-.27.35-.66.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0.99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
Chats</div>
<!-- Users Tab = Contact Icon -->
<div class="tab" id="tabUsers">
<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4S14.21 4 12 4 8 5.79 8 8s1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
Users</div>
<!-- Calls Tab = WhatsApp Phone Icon -->
<div class="tab" id="tabCalls">
<svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.57c.27-.27.35-.66.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0.99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
Calls</div>
</div>

<div class="statusBar glass" id="statusBar" style="display:none"></div>

<div class="chatHeader glass" id="chatHeader">
<span class="backBtn" id="backBtn">←</span>
<h3 id="chatWithName">Chat</h3>
</div>

<div id="typing"></div>
<div id="chatArea"></div>

<div class="bottom glass" id="bottomBar">
<!-- Video Call Icon -->
<span class="iconBtn" id="imgBtn" title="Video/Image">
<svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1.45-1 1v10c0.55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
</span>
<!-- Voice Note Icon -->
<span class="iconBtn" id="micBtn" title="Voice Note">
<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/><g opacity="0.5"><path d="M3 10v2c0 1.1.9 2 2 2h1v-2H5c-.55 0-1-.45-1-1v-1H3v2zM21 10v2c0 1.1-.9 2-2 2h-1v-2h1c.55 0 1-.45 1-1v-1h1v2z"/></g></svg>
</span>
<input type="file" id="mediaInput" accept="image/*,video/*" style="display:none">
<input id="messageInput" placeholder="Type message...">
<button id="sendBtn">
<svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:#fff"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
</button>
</div>
</div>

<!-- Gemini Bot Icon Green -->
<button id="botBtn" title="Khamis AI">
<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
</button>

<!-- MODALS SAME AS BEFORE -->
<div class="modal" id="setup"><div class="modalBox">
<h2>Setup Profile</h2><input id="username" placeholder="Musa_Kano" maxlength="15">
<button class="btn" id="startBtn">Start</button>
</div></div>

<div class="modal" id="settingsModal"><div class="modalBox">
<h3>Settings</h3>
<div style="display:flex;justify-content:space-between;padding:14px 0">
<span>Language</span><select id="lang"><option value="en">English</option><option value="ha">Hausa</option></select></div>
<div style="display:flex;justify-content:space-between;padding:14px 0">
<span>Theme</span><select id="theme"><option value="light">Light</option><option value="dark">Dark</option></select></div>
<button class="btn" id="closeSetBtn">Close</button>
</div></div>

<div class="modal" id="groupModal"><div class="modalBox">
<h3>Create Group</h3><input id="groupName" placeholder="Group name">
<button class="btn" id="createGroupBtn">Create</button><button class="btn" style="background:#6b7280" id="cancelGroupBtn">Cancel</button>
</div></div>

<div class="modal" id="statusModal"><div class="modalBox">
<h3>Post Status</h3><input type="file" id="statusInput" accept="image/*,video/*">
<button class="btn" id="postStatusBtn">Post</button><button class="btn" style="background:#6b7280" id="cancelStatusBtn">Cancel</button>
</div></div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy, updateDoc, deleteDoc, doc, setDoc, getDocs, where, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {apiKey:"AIzaSyAsFeKfeYTIGzP221hwPlFBHPiYyy-TLqE",authDomain:"khamchat-1d5a4.firebaseapp.com",projectId:"khamchat-1d5a4",storageBucket:"khamchat-1d5a4.firebasestorage.app",messagingSenderId:"515176934851",appId:"1:515176934851:web:4ec261196d1ff497666176"};

// === PUT YOUR KEYS HERE ===
const GEMINI_API_KEY = "PASTE_GEMINI_KEY_HERE";
const MONETAG_KEY = "PASTE_MONETAG_KEY_HERE";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let me = null, username = '', currentChatId = null, lang = 'en', isSetup = false;
let mediaRecorder, audioChunks = [], typingTimeout;

signInAnonymously(auth).catch(e=>toast('Auth Error'));

onAuthStateChanged(auth, async (user) => {
if(!user) return; me = user;
const snap = await getDocs(query(collection(db,'users'), where('uid','==',user.uid)));
if(!snap.empty){username = snap.docs[0].data().displayName; isSetup = true; document.getElementById("setup").classList.remove('show'); loadChats();}
else{document.getElementById("setup").classList.add('show');}
});

document.getElementById("startBtn").onclick = async () => {
username = document.getElementById("username").value.trim();
if(username.length < 3) return toast('Username 3+ letters');
const check = await getDocs(query(collection(db,'users'), where('username','==',username.toLowerCase())));
if(!check.empty) return toast('Username taken');
await setDoc(doc(db,'users',me.uid), {uid:me.uid, username: username.toLowerCase(), displayName: username, photo:'👤'});
isSetup = true; document.getElementById("setup").classList.remove('show'); loadChats();
};

function showMonetagAd(){
if(MONETAG_KEY === "PASTE_MONETAG_KEY_HERE"){toast("Add Monetag Key first");return;}
const s = document.createElement('script'); s.src = `https://www.monetag.com/script.js?key=${MONETAG_KEY}`; document.body.appendChild(s); toast('Ad opened +$0.001');
}

// === TABS ===
document.getElementById("tabChats").onclick = () => {setTab('Chats'); loadChats();}
document.getElementById("tabUsers").onclick = () => {setTab('Users'); loadUsers();}
document.getElementById("tabCalls").onclick = () => {setTab('Calls'); loadCalls();}
function setTab(name){['Chats','Users','Calls'].forEach(t=>document.getElementById('tab'+t).classList.remove('active')); document.getElementById('tab'+name).classList.add('active');}

async function loadChats(){
document.getElementById("chatArea").innerHTML = '<button class="btn" onclick="document.getElementById(\'groupModal\').classList.add(\'show\')">+ New Group</button>';
const snap = await getDocs(collection(db,'groups'));
snap.forEach(d=>{const g=d.data(); document.getElementById("chatArea").innerHTML += `<div class="groupItem" onclick="openGroup('${d.id}','${g.name}')">👥 <div><b>${g.name}</b><br><span>${g.members.length} members</span></div></div>`;});
loadStatusBar();
}

async function loadUsers(){
document.getElementById("chatArea").innerHTML = '<div style="text-align:center;color:var(--text2)">Loading...</div>';
const snap = await getDocs(collection(db,'users')); let html='';
snap.forEach(d=>{if(d.id === me.uid) return; const u=d.data(); html += `<div class="userItem" onclick="openChat('${d.id}','${u.displayName}')">👤 <div><b>${u.displayName}</b><br><span>Tap to chat</span></div></div>`;});
html += `<div class="userItem" onclick="openBotChat()">🤖 <div><b>Khamis AI</b><br><span style="color:var(--gold)">Ask me anything</span></div></div>`;
document.getElementById("chatArea").innerHTML = html;
}

async function loadCalls(){
document.getElementById("chatArea").innerHTML = '<div style="text-align:center;color:var(--text2);margin-top:40px">No calls yet 📞</div>';
}

// === STATUS ===
async function loadStatusBar(){
document.getElementById("statusBar").style.display='flex';
const snap = await getDocs(query(collection(db,'status'), where('time','>',new Date(Date.now()-24*3600*1000))));
let html = `<div class="statusItem" onclick="document.getElementById('statusModal').classList.add('show')"><img src="https://ui-avatars.com/api/?name=${username}"> <div>Add</div></div>`;
snap.forEach(d=>{const s=d.data(); html += `<div class="statusItem" onclick="viewStatus('${s.url}')"><img class="storyRing" src="${s.url}"> <div>${s.name}</div></div>`;});
document.getElementById("statusBar").innerHTML = html;
}
document.getElementById("postStatusBtn").onclick = async () => {
const file = document.getElementById("statusInput").files[0]; if(!file) return;
const refS = ref(storage,"status/"+Date.now()); await uploadBytes(refS,file); const url = await getDownloadURL(refS);
await addDoc(collection(db,'status'), {uid:me.uid, name:username, url:url, time:serverTimestamp()});
document.getElementById("statusModal").classList.remove('show'); loadStatusBar();
}
window.viewStatus = (url) => {window.open(url,'_blank');}

// === GROUP + CHAT + BOT ===
window.openGroup = (gid, name) => {
currentChatId = 'group_'+gid; document.getElementById("chatWithName").innerText = name;
document.getElementById("chatArea").innerHTML = ''; document.getElementById("chatHeader").classList.add('show'); document.getElementById("bottomBar").classList.add('show');
const q = query(collection(db,'chats',currentChatId,'messages'), orderBy("time","asc"));
onSnapshot(q,(snapshot)=>{renderMessages(snapshot);});
}
document.getElementById("createGroupBtn").onclick = async () => {
const name = document.getElementById("groupName").value.trim(); if(!name) return;
await addDoc(collection(db,'groups'), {name:name, members:[me.uid], created:serverTimestamp()});
document.getElementById("groupModal").classList.remove('show'); loadChats();
}
document.getElementById("cancelGroupBtn").onclick = () => document.getElementById("groupModal").classList.remove('show');

window.openChat = (uid, name) => {
currentChatId = [me.uid, uid].sort().join('_'); document.getElementById("chatWithName").innerText = name;
document.getElementById("chatArea").innerHTML = ''; document.getElementById("chatHeader").classList.add('show'); document.getElementById("bottomBar").classList.add('show');
const q = query(collection(db,'chats',currentChatId,'messages'), orderBy("time","asc"));
onSnapshot(q,(snapshot)=>{renderMessages(snapshot); if(snapshot.docs.length) updateDoc(doc(db,"chats",currentChatId,"messages",snapshot.docs[snapshot.docs.length-1].id),{seen:true});});
}
window.openBotChat = () => {
currentChatId = "bot_chat_"+me.uid; document.getElementById("chatWithName").innerText = "Khamis AI";
document.getElementById("chatArea").innerHTML = ''; document.getElementById("chatHeader").classList.add('show'); document.getElementById("bottomBar").classList.add('show');
const q = query(collection(db,'chats',currentChatId,'messages'), orderBy("time","asc"));
onSnapshot(q,(snapshot)=>{renderMessages(snapshot);});
}
document.getElementById("botBtn").onclick = () => openBotChat();
document.getElementById("backBtn").onclick = () => {currentChatId=null; document.getElementById("chatHeader").classList.remove('show'); document.getElementById("bottomBar").classList.remove('show'); document.getElementById("tabChats").click();}

// === MESSAGES ===
function renderMessages(snapshot){
let area = document.getElementById("chatArea"); area.innerHTML="";
snapshot.forEach((docSnap)=>{
let data = docSnap.data(); let div = document.createElement("div");
div.className="message "+(data.sender===me.uid?"me":data.sender==='bot'?"bot":"");
let reactionsHtml = `<div class="reactionBar">${['😂','❤️','👍','🔥'].map(r=>`<span class="reaction" onclick="addReaction('${docSnap.id}','${r}')">${r}</span>`).join('')}</div>`;
let reactCounts = data.reactions?Object.entries(data.reactions).map(([r,u])=>`<span class="reactionCount">${r} ${u.length}</span>`).join(''):'';
let media = data.image?`<img src="${data.image}">`:data.video?`<video controls src="${data.video}"></video>`:data.audio?`<audio controls src="${data.audio}"></audio>`:"";
div.innerHTML=`${reactionsHtml}<b>${data.username}</b><br>${data.text||""}${media}
<div class="small">${data.seen?'<span class="ticks seen">✓ Seen</span>':'<span class="ticks">✓ Sent</span>'} ${data.edited?'(edited)':''} ${reactCounts}
${data.sender===me.uid?`<button class="msgBtn" onclick="editMessage('${docSnap.id}','${data.text||""}')">Edit</button><button class="msgBtn" onclick="deleteMessage('${docSnap.id}')">Del</button>`:''}
</div>`; area.appendChild(div);
});
area.scrollTop=area.scrollHeight;
}
window.addReaction = async (id, emoji) => {const refM = doc(db,"chats",currentChatId,"messages",id); await updateDoc(refM,{[`reactions.${emoji}`]: arrayUnion(me.uid)});}
window.deleteMessage = async (id) => {await deleteDoc(doc(db,"chats",currentChatId,"messages",id));}
window.editMessage = async (id, oldText) => {let newText = prompt('Edit message:', oldText); if(newText){await updateDoc(doc(db,"chats",currentChatId,"messages",id),{text:newText,edited:true});}}

// === VOICE + MEDIA ===
document.getElementById("micBtn").onmousedown = startRecording;
document.getElementById("micBtn").onmouseup = stopRecording;
document.getElementById("micBtn").ontouchstart = startRecording;
document.getElementById("micBtn").ontouchend = stopRecording;
async function startRecording(e){e.preventDefault(); const stream = await navigator.mediaDevices.getUserMedia({audio:true}); mediaRecorder = new MediaRecorder(stream); audioChunks = []; mediaRecorder.ondataavailable = e => audioChunks.push(e.data); mediaRecorder.onstop = async () => {const blob = new Blob(audioChunks, {type:'audio/webm'}); const url = await uploadFile(blob,'voice'); await sendMessage("", url, 'audio');}; mediaRecorder.start(); document.getElementById("micBtn").classList.add("recording");}
function stopRecording(){if(mediaRecorder){mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(t=>t.stop());} document.getElementById("micBtn").classList.remove("recording");}
document.getElementById("imgBtn").onclick = () => document.getElementById("mediaInput").click();
document.getElementById("mediaInput").onchange = async e => {const file=e.target.files[0]; if(!file) return; const url=await uploadFile(file,file.type.startsWith('video')?'video':'image'); await sendMessage("", url, file.type.startsWith('video')?'video':'image');}
async function uploadFile(file, folder){const refS=ref(storage,folder+"/"+Date.now()); await uploadBytes(refS,file); return await getDownloadURL(refS);}

// === SEND + TYPING + GEMINI ===
document.getElementById("sendBtn").onclick = () => sendMessage();
document.getElementById("messageInput").oninput = () => {
if(currentChatId &&!currentChatId.startsWith('bot_chat_')){updateDoc(doc(db,'typing',currentChatId), {[me.uid]:true}); clearTimeout(typingTimeout); typingTimeout=setTimeout(()=>updateDoc(doc(db,'typing',currentChatId), {[me.uid]:false}),2000);}
}
onSnapshot(doc(db,'typing',currentChatId||'none'),(snap)=>{if(snap.exists()){const t=snap.data(); const typingUsers=Object.keys(t).filter(k=>t[k]&&k!==me.uid); document.getElementById("typing").innerText = typingUsers.length?"Someone is typing...":"";}});

async function sendMessage(text=null, mediaUrl=null, mediaType=''){
if(!isSetup) return document.getElementById("setup").classList.add('show');
if(!currentChatId) return toast('Tap a user first');
text = text?? document.getElementById("messageInput").value.trim();
if(!text &&!mediaUrl) return;
const payload = {sender:me.uid, username:username, text:text, time:serverTimestamp(), seen:false, edited:false, reactions:{}};
if(mediaType==='image') payload.image=mediaUrl; if(mediaType==='video') payload.video=mediaUrl; if(mediaType==='audio') payload.audio=mediaUrl;
await addDoc(collection(db,"chats",currentChatId,"messages"), payload);
document.getElementById("messageInput").value="";

if(currentChatId.startsWith("bot_chat_")){
document.getElementById("typing").innerText = "Khamis AI is typing...";
const reply = await callGemini(text);
await addDoc(collection(db,"chats",currentChatId,"messages"),{sender:'bot', username:'Khamis AI', text:reply, time:serverTimestamp(), seen:true, reactions:{}});
speak(reply); document.getElementById("typing").innerText = "";
}
async function callGemini(text){
if(GEMINI_API_KEY === "PASTE_GEMINI_KEY_HERE") return "Add Gemini API Key first";
const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:text}]}]})});
const data = await res.json(); return data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't respond";
}
function speak(text){const utter = new SpeechSynthesisUtterance(text); utter.lang = lang==='ha'?'ha-NG':'en-US'; speechSynthesis.speak(utter);}

document.getElementById("setBtn").onclick = () => document.getElementById("settingsModal").classList.add('show');
document.getElementById("closeSetBtn").onclick = () => document.getElementById("settingsModal").classList.remove('show');
document.getElementById("moneyBtn").onclick = () => showMonetagAd();
document.getElementById("lang").onchange = e => {lang = e.target.value;}
document.getElementById("theme").onchange = e => {e.target.value==='dark'?document.body.classList.add('dark'):document.body.classList.remove('dark');}
document.getElementById("cancelStatusBtn").onclick = () => document.getElementById("statusModal").classList.remove('show');
function toast(msg){const t=document.getElementById('toast');t.innerText=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
</script>
